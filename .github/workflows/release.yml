name: Build and Release Executables

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.release_name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    env:
      APPLE_SIGNING_READY: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 != '' && secrets.APPLE_DEVELOPER_ID_P12_PASSWORD != '' && secrets.APPLE_DEVELOPER_ID_APPLICATION != '' }}
      APPLE_NOTARY_READY: ${{ secrets.APPLE_NOTARY_API_KEY_ID != '' && secrets.APPLE_NOTARY_API_ISSUER_ID != '' && secrets.APPLE_NOTARY_API_PRIVATE_KEY_BASE64 != '' }}
      WINDOWS_SIGNING_READY: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 != '' && secrets.WINDOWS_CERTIFICATE_PASSWORD != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            binary_name: distill-linux-x64
            release_name: distill-linux-x64
            upload_path: dist/distill-linux-x64
          - os: macos-15-intel
            binary_name: distill-macos-x64
            release_name: distill-macos-x64.zip
            upload_path: dist/distill-macos-x64.zip
          - os: macos-14
            binary_name: distill-macos-arm64
            release_name: distill-macos-arm64.zip
            upload_path: dist/distill-macos-arm64.zip
          - os: windows-2022
            binary_name: distill-windows-x64.exe
            release_name: distill-windows-x64.exe
            upload_path: dist/distill-windows-x64.exe

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build executable
        run: |
          pyinstaller --noconfirm --clean --onefile --name ${{ matrix.binary_name }} --collect-data specforge_distill src/specforge_distill/cli.py

      - name: Sign Windows executable
        if: runner.os == 'Windows' && env.WINDOWS_SIGNING_READY == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_PFX_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Sort-Object FullName -Descending |
            Select-Object -First 1 -ExpandProperty FullName
          if (-not $signtool) {
            throw "signtool.exe not found on runner"
          }
          & $signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $certPath /p $env:WINDOWS_CERTIFICATE_PASSWORD "dist\${{ matrix.binary_name }}"

      - name: Prepare macOS signing keychain
        if: runner.os == 'macOS' && env.APPLE_SIGNING_READY == 'true'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_P12_BASE64 }}
          APPLE_DEVELOPER_ID_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_P12_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/apple-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/specforge-signing.keychain-db"
          echo "$APPLE_DEVELOPER_ID_P12_BASE64" | base64 --decode > "$CERT_PATH"
          security create-keychain -p runner "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p runner "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_DEVELOPER_ID_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Sign macOS executable
        if: runner.os == 'macOS' && env.APPLE_SIGNING_READY == 'true'
        shell: bash
        env:
          APPLE_DEVELOPER_ID_APPLICATION: ${{ secrets.APPLE_DEVELOPER_ID_APPLICATION }}
        run: |
          codesign --force --timestamp --options runtime --sign "$APPLE_DEVELOPER_ID_APPLICATION" "dist/${{ matrix.binary_name }}"

      - name: Smoke test executable on POSIX
        if: runner.os != 'Windows'
        shell: bash
        env:
          OUTPUT_DIR: ${{ runner.temp }}/distill-release-smoke
        run: |
          rm -rf "$OUTPUT_DIR"
          ./dist/${{ matrix.binary_name }} --version
          ./dist/${{ matrix.binary_name }} --help > /dev/null
          ./dist/${{ matrix.binary_name }} fixtures/specs/sample-digital.pdf -o "$OUTPUT_DIR" --report > /dev/null
          test -f "$OUTPUT_DIR/manifest.json"
          test -f "$OUTPUT_DIR/full.md"
          test -f "$OUTPUT_DIR/requirements.md"
          test -f "$OUTPUT_DIR/architecture.md"

      - name: Smoke test executable on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          OUTPUT_DIR: ${{ runner.temp }}\distill-release-smoke
        run: |
          if (Test-Path $env:OUTPUT_DIR) {
            Remove-Item -Recurse -Force $env:OUTPUT_DIR
          }
          .\dist\${{ matrix.binary_name }} --version
          .\dist\${{ matrix.binary_name }} --help | Out-Null
          .\dist\${{ matrix.binary_name }} fixtures\specs\sample-digital.pdf -o $env:OUTPUT_DIR --report | Out-Null
          if (-not (Test-Path (Join-Path $env:OUTPUT_DIR "manifest.json"))) { throw "manifest.json missing" }
          if (-not (Test-Path (Join-Path $env:OUTPUT_DIR "full.md"))) { throw "full.md missing" }
          if (-not (Test-Path (Join-Path $env:OUTPUT_DIR "requirements.md"))) { throw "requirements.md missing" }
          if (-not (Test-Path (Join-Path $env:OUTPUT_DIR "architecture.md"))) { throw "architecture.md missing" }

      - name: Validate Windows signature
        if: runner.os == 'Windows' && env.WINDOWS_SIGNING_READY == 'true'
        shell: pwsh
        run: |
          $signature = Get-AuthenticodeSignature "dist\${{ matrix.binary_name }}"
          if ($signature.Status -ne "Valid") {
            throw "Expected a valid Authenticode signature, got: $($signature.Status)"
          }

      - name: Package macOS release asset
        if: runner.os == 'macOS'
        shell: bash
        run: |
          ditto -c -k --keepParent "dist/${{ matrix.binary_name }}" "${{ matrix.upload_path }}"

      - name: Validate macOS signature
        if: runner.os == 'macOS' && env.APPLE_SIGNING_READY == 'true'
        shell: bash
        run: |
          codesign --verify --strict --verbose=2 "dist/${{ matrix.binary_name }}"
          spctl --assess --type execute --verbose=4 "dist/${{ matrix.binary_name }}"

      - name: Notarize macOS release asset
        if: runner.os == 'macOS' && env.APPLE_SIGNING_READY == 'true' && env.APPLE_NOTARY_READY == 'true'
        shell: bash
        env:
          APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          APPLE_NOTARY_API_ISSUER_ID: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
          APPLE_NOTARY_API_PRIVATE_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_PRIVATE_KEY_BASE64 }}
        run: |
          API_KEY_PATH="$RUNNER_TEMP/AuthKey_${APPLE_NOTARY_API_KEY_ID}.p8"
          echo "$APPLE_NOTARY_API_PRIVATE_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          xcrun notarytool submit "${{ matrix.upload_path }}" --key "$API_KEY_PATH" --key-id "$APPLE_NOTARY_API_KEY_ID" --issuer "$APPLE_NOTARY_API_ISSUER_ID" --wait

      - name: Write SHA256 checksum on POSIX
        if: runner.os != 'Windows'
        shell: bash
        run: |
          shasum -a 256 "${{ matrix.upload_path }}" > "${{ matrix.upload_path }}.sha256"

      - name: Write SHA256 checksum on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $hash = (Get-FileHash "${{ matrix.upload_path }}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${{ matrix.release_name }}" | Set-Content "${{ matrix.upload_path }}.sha256"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.release_name }}
          path: |
            ${{ matrix.upload_path }}
            ${{ matrix.upload_path }}.sha256

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            ${{ matrix.upload_path }}
            ${{ matrix.upload_path }}.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
